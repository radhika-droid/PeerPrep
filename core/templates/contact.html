{% extends "base.html" %}

{% block title %}Contact Us — PeerPrep{% endblock %}

{% block content %}
<div class="container mt-5">

    <h1 class="mb-4 text-center">Contact Us</h1>
    <p class="lead text-center mb-5">
        Have a question, suggestion, or just want to say hello?  
        We'd love to hear from you!
    </p>

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card bg-dark text-light p-4"
                 style="border-radius:12px; border:1px solid rgba(255,255,255,0.1);">

                <form method="POST" class="contact-form">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Your Name</label>
                        <input type="text" name="name" class="form-control bg-secondary text-light" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Your Email</label>
                        <input type="email" name="email" class="form-control bg-secondary text-light" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea name="message" rows="5" class="form-control bg-secondary text-light" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 submit-btn">
                        Send Message
                    </button>

                </form>

            </div>

        </div>
    </div>

</div>
{% endblock %}
