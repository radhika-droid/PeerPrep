{% extends "base.html" %}

{% block title %}Add Success Story — PeerPrep{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width:700px;">

    <h1 class="mb-4">Share Your Success Story</h1>

    <div class="card bg-dark text-light p-4"
         style="border-radius:12px; border:1px solid rgba(255,255,255,0.1);">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Story Title</label>
                <input type="text" name="title" class="form-control bg-secondary text-light" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Your Story</label>
                <textarea name="story" rows="6" class="form-control bg-secondary text-light" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">
                Submit Story
            </button>
        </form>

    </div>

</div>
{% endblock %}
