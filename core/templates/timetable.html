<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Timetable — PeerPrep</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Clash+Display:wght@400;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#060810; --s1:#0d1018; --s2:#141720; --s3:#1c2030;
    --border:rgba(255,255,255,0.07);
    --a1:#3d7fff; --a2:#ff6b35; --a3:#00e5a0; --a4:#c084fc;
    --text:#dde3f0; --muted:#5a6280; --danger:#ff3d5a; --r:14px;
  }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Instrument Sans',sans-serif; }
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}

  .app { display:grid; grid-template-columns:260px 1fr; min-height:100vh; }

  /* sidebar */
  .sidebar { background:var(--s1); border-right:1px solid var(--border); padding:2rem 1.5rem; display:flex; flex-direction:column; gap:2rem; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .logo { display:flex; align-items:center; gap:.6rem; }
  .logo-icon { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--a1),var(--a4)); display:grid; place-items:center; font-size:1.1rem; }
  .logo-text { font-family:'Clash Display',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:-.02em; }
  .logo-text span { color:var(--a1); }
  .sb-label { font-family:'DM Mono',monospace; font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }
  .day-nav { display:flex; flex-direction:column; gap:.3rem; }
  .day-btn { display:flex; align-items:center; justify-content:space-between; padding:.55rem .9rem; border-radius:9px; background:transparent; border:none; color:var(--muted); font-family:'Instrument Sans',sans-serif; font-size:.9rem; font-weight:500; cursor:pointer; transition:all .18s; text-align:left; }
  .day-btn:hover { background:var(--s2); color:var(--text); }
  .day-btn.active { background:var(--s2); color:var(--text); }
  .day-btn.active .db-name::before { content:'● '; color:var(--a1); font-size:.5rem; vertical-align:middle; }
  .day-count { font-family:'DM Mono',monospace; font-size:.68rem; background:var(--s3); color:var(--muted); padding:.1rem .45rem; border-radius:99px; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; }
  .stat { background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:.8rem; text-align:center; }
  .stat-n { font-family:'Clash Display',sans-serif; font-size:1.5rem; font-weight:700; color:var(--a1); line-height:1; }
  .stat-l { font-family:'DM Mono',monospace; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:.25rem; }
  .btn-add-main { display:flex; align-items:center; justify-content:center; gap:.5rem; padding:.8rem; border-radius:var(--r); background:var(--a1); border:none; color:#fff; font-family:'Clash Display',sans-serif; font-weight:600; font-size:.95rem; cursor:pointer; transition:all .2s; margin-top:auto; box-shadow:0 4px 24px rgba(61,127,255,.35); }
  .btn-add-main:hover { filter:brightness(1.15); transform:translateY(-1px); box-shadow:0 8px 30px rgba(61,127,255,.45); }

  /* main */
  .main { padding:2.5rem 2rem; overflow-y:auto; }
  .main-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:2.5rem; }
  .main-title { font-family:'Clash Display',sans-serif; font-size:clamp(1.8rem,3vw,2.6rem); font-weight:700; letter-spacing:-.03em; line-height:1.1; }
  .main-title .accent { color:var(--a1); }
  .main-sub { font-family:'DM Mono',monospace; font-size:.7rem; color:var(--muted); margin-top:.4rem; letter-spacing:.06em; }

  /* week strip */
  .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:.5rem; margin-bottom:2.5rem; }
  .week-cell { background:var(--s1); border:1px solid var(--border); border-radius:10px; padding:.7rem .5rem; text-align:center; cursor:pointer; transition:all .18s; }
  .week-cell:hover { border-color:rgba(61,127,255,.3); background:var(--s2); }
  .week-cell.active { border-color:var(--a1); background:rgba(61,127,255,.08); }
  .week-cell.has-entries { border-color:rgba(61,127,255,.2); }
  .wc-day { font-family:'DM Mono',monospace; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .wc-dot { width:6px; height:6px; border-radius:50%; background:var(--a1); margin:.4rem auto 0; opacity:0; transition:opacity .2s; }
  .week-cell.has-entries .wc-dot { opacity:1; }

  /* sections & cards */
  .section-header { display:flex; align-items:center; gap:1rem; margin-bottom:1.2rem; }
  .section-title { font-family:'Clash Display',sans-serif; font-size:1.3rem; font-weight:700; white-space:nowrap; }
  .section-line { flex:1; height:1px; background:var(--border); }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; margin-bottom:2rem; }
  .card { background:var(--s1); border:1px solid var(--border); border-radius:var(--r); padding:1.3rem 1.4rem; position:relative; overflow:hidden; transition:transform .2s,box-shadow .2s,border-color .2s; animation:popIn .3s ease both; }
  .card:hover { transform:translateY(-3px); box-shadow:0 16px 48px rgba(0,0,0,.4); border-color:rgba(61,127,255,.25); }
  .card-stripe { position:absolute; top:0; left:0; right:0; height:2px; }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:.5rem; margin-bottom:.8rem; }
  .card-subject { font-family:'Clash Display',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:-.01em; flex:1; }
  .card-badge { font-family:'DM Mono',monospace; font-size:.6rem; font-weight:500; letter-spacing:.1em; text-transform:uppercase; padding:.2rem .6rem; border-radius:99px; white-space:nowrap; border:1px solid; flex-shrink:0; }
  .card-dur { font-family:'DM Mono',monospace; font-size:.75rem; color:var(--a3); margin-bottom:.8rem; }
  /* .card-notes { font-size:.83rem; color:var(--muted); line-height:1.55; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:1.2rem; } */
  .card-footer { display:flex; gap:.5rem; margin-top:1.1rem; padding-top:.9rem; border-top:1px solid var(--border); }
  .btn-sm { flex:1; padding:.4rem .6rem; border-radius:7px; font-family:'Instrument Sans',sans-serif; font-weight:600; font-size:.78rem; border:1px solid; cursor:pointer; transition:all .15s; }
  .btn-edit-sm { background:transparent; border-color:rgba(61,127,255,.4); color:var(--a1); }
  .btn-edit-sm:hover { background:rgba(61,127,255,.12); border-color:var(--a1); }
  .btn-del-sm  { background:transparent; border-color:rgba(255,61,90,.3); color:var(--danger); }
  .btn-del-sm:hover  { background:rgba(255,61,90,.1); border-color:var(--danger); }

  .empty { grid-column:1/-1; text-align:center; padding:4rem 2rem; color:var(--muted); }
  .empty-icon { font-size:3rem; margin-bottom:.8rem; }
  .empty h3 { color:var(--text); font-family:'Clash Display',sans-serif; font-size:1.2rem; margin-bottom:.4rem; }

  /* modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(8px); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .22s; }
  .overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--s1); border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:2rem 2.2rem; width:min(480px,94vw); box-shadow:0 40px 100px rgba(0,0,0,.7); transform:translateY(16px) scale(.97); transition:transform .22s; }
  .overlay.open .modal { transform:none; }
  .modal-title { font-family:'Clash Display',sans-serif; font-size:1.4rem; font-weight:700; margin-bottom:1.6rem; }
  .modal-title span { color:var(--a1); }
  .fg { margin-bottom:1rem; }
  .fl { display:block; font-family:'DM Mono',monospace; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:.4rem; }
  .fi { width:100%; background:var(--s2); border:1.5px solid var(--border); border-radius:9px; padding:.65rem .9rem; color:var(--text); font-family:'Instrument Sans',sans-serif; font-size:.92rem; transition:border-color .2s; }
  .fi:focus { outline:none; border-color:var(--a1); box-shadow:0 0 0 3px rgba(61,127,255,.12); }
  select.fi option { background:var(--s2); }
  .fr { display:flex; gap:.8rem; }
  .fr .fg { flex:1; }
  .modal-btns { display:flex; gap:.7rem; margin-top:1.6rem; }
  .btn-cancel { flex:1; padding:.72rem; border-radius:10px; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Instrument Sans',sans-serif; font-weight:600; cursor:pointer; transition:all .15s; }
  .btn-cancel:hover { border-color:var(--muted); color:var(--text); }
  .btn-save { flex:2; padding:.72rem; border-radius:10px; background:var(--a1); border:none; color:#fff; font-family:'Clash Display',sans-serif; font-weight:600; font-size:.95rem; cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(61,127,255,.3); }
  .btn-save:hover { filter:brightness(1.12); box-shadow:0 6px 28px rgba(61,127,255,.45); }

  .del-modal { text-align:center; }
  .del-icon { font-size:2.8rem; margin-bottom:.5rem; }
  .del-title { font-family:'Clash Display',sans-serif; font-size:1.3rem; font-weight:700; margin-bottom:.4rem; }
  .del-sub { font-size:.86rem; color:var(--muted); margin-bottom:1.6rem; }
  .btn-danger { background:var(--danger)!important; box-shadow:0 4px 20px rgba(255,61,90,.3)!important; }

  .toast { position:fixed; bottom:2rem; right:2rem; z-index:200; background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:.8rem 1.2rem; font-size:.88rem; font-weight:500; box-shadow:0 8px 32px rgba(0,0,0,.4); transform:translateY(10px); opacity:0; transition:all .25s; pointer-events:none; }
  .toast.show { transform:none; opacity:1; }
  .toast.success { border-color:rgba(0,229,160,.3); color:var(--a3); }
  .toast.error   { border-color:rgba(255,61,90,.3);  color:var(--danger); }

  @keyframes popIn { from{opacity:0;transform:translateY(10px) scale(.97)} to{opacity:1;transform:none} }

  @media(max-width:768px){
    .app{grid-template-columns:1fr}
    .sidebar{position:static;height:auto;padding:1rem;gap:1rem;flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid var(--border)}
    .stats{display:none}
    .btn-add-main{margin-top:0}
    .main{padding:1.5rem 1rem}
  }
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <div class="logo-text">Peer<span>Prep</span></div>
    </div>

    <div>
      <div class="sb-label">Filter by Day</div>
      <nav class="day-nav" id="dayNav">
        <button class="day-btn active" data-day="all"><span class="db-name">All Sessions</span><span class="day-count" id="cnt-all">0</span></button>
        <button class="day-btn" data-day="Monday"><span class="db-name">Monday</span><span class="day-count" id="cnt-Monday">0</span></button>
        <button class="day-btn" data-day="Tuesday"><span class="db-name">Tuesday</span><span class="day-count" id="cnt-Tuesday">0</span></button>
        <button class="day-btn" data-day="Wednesday"><span class="db-name">Wednesday</span><span class="day-count" id="cnt-Wednesday">0</span></button>
        <button class="day-btn" data-day="Thursday"><span class="db-name">Thursday</span><span class="day-count" id="cnt-Thursday">0</span></button>
        <button class="day-btn" data-day="Friday"><span class="db-name">Friday</span><span class="day-count" id="cnt-Friday">0</span></button>
        <button class="day-btn" data-day="Saturday"><span class="db-name">Saturday</span><span class="day-count" id="cnt-Saturday">0</span></button>
        <button class="day-btn" data-day="Sunday"><span class="db-name">Sunday</span><span class="day-count" id="cnt-Sunday">0</span></button>
      </nav>
    </div>

    <div>
      <div class="sb-label">Overview</div>
      <div class="stats">
        <div class="stat"><div class="stat-n" id="st-sessions">0</div><div class="stat-l">Sessions</div></div>
        <div class="stat"><div class="stat-n" id="st-subjects">0</div><div class="stat-l">Subjects</div></div>
        <div class="stat"><div class="stat-n" id="st-days">0</div><div class="stat-l">Days</div></div>
        <div class="stat"><div class="stat-n" id="st-hours">0h</div><div class="stat-l">Est. Hours</div></div>
      </div>
    </div>

    <button class="btn-add-main" onclick="openAdd()">＋ Add Session</button>
  </aside>

  <main class="main">
    <div class="main-header">
      <div>
        <h1 class="main-title">Study <span class="accent">Timetable</span></h1>
        <p class="main-sub" id="mainSub">// 0 sessions this week</p>
      </div>
    </div>
    <div class="week-grid" id="weekGrid"></div>
    <div id="sections"></div>
  </main>
</div>

<!-- Add / Edit Modal -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="modal-title" id="formTitle">Add <span>Session</span></div>
    <div class="fr">
      <div class="fg">
        <label class="fl">Day</label>
        <select id="fDay" class="fi">
          <option value="">— select —</option>
          <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
          <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">Duration</label>
        <input id="fDur" class="fi" placeholder="e.g. 1h 30m">
      </div>
    </div>
    <div class="fg">
      <label class="fl">Subject</label>
      <input id="fSub" class="fi" placeholder="e.g. Mathematics" maxlength="60">
    </div>
    <div class="fg">
      <label class="fl">Notes <span style="opacity:.4">(optional)</span></label>
      <textarea id="fNotes" class="fi" rows="3" placeholder="Topics, goals, chapters…" maxlength="300" style="resize:vertical"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModals()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveEntry()">Save Session</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="overlay" id="delOverlay">
  <div class="modal del-modal">
    <div class="del-icon">🗑️</div>
    <div class="del-title">Remove Session?</div>
    <div class="del-sub" id="delSub">This will permanently delete the session.</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModals()">Cancel</button>
      <button class="btn-save btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS   = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DSHORT = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
const COLORS = ['#3d7fff','#c084fc','#00e5a0','#fbbf24','#ff6b35','#f472b6','#34d399'];
const KEY    = 'peerprep_tt';

let entries   = JSON.parse(localStorage.getItem(KEY) || '[]');
let editId    = null;
let deleteId  = null;
let activeDay = 'all';

const persist = () => localStorage.setItem(KEY, JSON.stringify(entries));
const uid     = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const esc     = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── render ────────────────────────────────────────────────────────────────────
function render() {
  // week grid
  document.getElementById('weekGrid').innerHTML = DAYS.map((d,i) => {
    const has = entries.some(e => e.day === d);
    return `<div class="week-cell${has?' has-entries':''}${activeDay===d?' active':''}" onclick="toggleDay('${d}')">
      <div class="wc-day">${DSHORT[i]}</div><div class="wc-dot"></div>
    </div>`;
  }).join('');

  // sections
  const filtered = activeDay === 'all' ? entries : entries.filter(e => e.day === activeDay);
  const container = document.getElementById('sections');

  if (!filtered.length) {
    container.innerHTML = `<div class="cards"><div class="empty"><div class="empty-icon">📅</div>
      <h3>No sessions ${activeDay==='all'?'yet':'on '+activeDay}</h3>
      <p>Hit "Add Session" to build your schedule.</p></div></div>`;
  } else {
    const byDay = {};
    (activeDay==='all'?DAYS:[activeDay]).forEach(d => byDay[d]=[]);
    filtered.forEach(e => { if(byDay[e.day]) byDay[e.day].push(e); });
    container.innerHTML = Object.entries(byDay)
      .filter(([,a]) => a.length)
      .map(([day, arr]) => {
        const col = COLORS[DAYS.indexOf(day)];
        return `<div class="section-header">
            <span class="section-title">${day}</span>
            <div class="section-line"></div>
            <span style="font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted)">${arr.length} session${arr.length>1?'s':''}</span>
          </div>
          <div class="cards">${arr.map(e => `
            <div class="card">
              <div class="card-stripe" style="background:linear-gradient(90deg,${col},${col}44)"></div>
              <div class="card-top">
                <div class="card-subject">${esc(e.subject)}</div>
                <span class="card-badge" style="border-color:${col}44;color:${col}">${esc(e.day.slice(0,3).toUpperCase())}</span>
              </div>
              <div class="card-dur">⏱ ${esc(e.duration)}</div>
              ${e.notes ? `<div class="card-notes">${esc(e.notes)}</div>` : `<div class="card-notes" style="opacity:.3">No notes</div>`}
              <div class="card-footer">
                <button class="btn-sm btn-edit-sm" onclick="openEdit('${e.id}')">Edit</button>
                <button class="btn-sm btn-del-sm"  onclick="openDel('${e.id}')">Delete</button>
              </div>
            </div>`).join('')}
          </div>`;
      }).join('');
  }

  // stats
  const mins = entries.reduce((t,e) => {
    return t + (+((e.duration.match(/(\d+)\s*h/)||[0,0])[1]))*60 + (+((e.duration.match(/(\d+)\s*m/)||[0,0])[1]));
  }, 0);
  document.getElementById('st-sessions').textContent = entries.length;
  document.getElementById('st-subjects').textContent = new Set(entries.map(e=>e.subject.toLowerCase())).size;
  document.getElementById('st-days').textContent     = new Set(entries.map(e=>e.day)).size;
  document.getElementById('st-hours').textContent    = mins ? (mins/60).toFixed(1)+'h' : '0h';
  document.getElementById('mainSub').textContent     = `// ${entries.length} session${entries.length!==1?'s':''} this week`;

  // counts
  document.getElementById('cnt-all').textContent = entries.length;
  DAYS.forEach(d => { const el=document.getElementById('cnt-'+d); if(el) el.textContent=entries.filter(e=>e.day===d).length; });

  // sidebar active
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b.dataset.day===activeDay));
}

// ── filter ────────────────────────────────────────────────────────────────────
function toggleDay(d) { activeDay = activeDay===d ? 'all' : d; render(); }

document.getElementById('dayNav').addEventListener('click', e => {
  const btn = e.target.closest('.day-btn');
  if (btn) { activeDay = btn.dataset.day; render(); }
});

// ── modals ────────────────────────────────────────────────────────────────────
function openAdd() {
  editId = null;
  document.getElementById('formTitle').innerHTML = 'Add <span>Session</span>';
  document.getElementById('saveBtn').textContent = 'Save Session';
  ['fDay','fSub','fDur','fNotes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('formOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fSub').focus(),200);
}
function openEdit(id) {
  const e = entries.find(x=>x.id===id); if(!e) return;
  editId = id;
  document.getElementById('formTitle').innerHTML = 'Edit <span>Session</span>';
  document.getElementById('saveBtn').textContent = 'Update Session';
  document.getElementById('fDay').value   = e.day;
  document.getElementById('fSub').value   = e.subject;
  document.getElementById('fDur').value   = e.duration;
  document.getElementById('fNotes').value = e.notes||'';
  document.getElementById('formOverlay').classList.add('open');
}
function openDel(id) {
  deleteId = id;
  const e = entries.find(x=>x.id===id);
  document.getElementById('delSub').textContent = `"${e?.subject}" will be permanently removed.`;
  document.getElementById('delOverlay').classList.add('open');
}
function closeModals() { document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open')); }

// ── CRUD ──────────────────────────────────────────────────────────────────────
function saveEntry() {
  const day=document.getElementById('fDay').value.trim();
  const sub=document.getElementById('fSub').value.trim();
  const dur=document.getElementById('fDur').value.trim();
  const notes=document.getElementById('fNotes').value.trim();
  if (!day||!sub||!dur) { showToast('Day, Subject and Duration are required','error'); return; }
  if (editId) {
    const i=entries.findIndex(e=>e.id===editId);
    if(i>-1) entries[i]={...entries[i],day,subject:sub,duration:dur,notes};
    showToast(`"${sub}" updated ✓`,'success');
  } else {
    entries.push({id:uid(),day,subject:sub,duration:dur,notes});
    showToast(`"${sub}" added ✓`,'success');
  }
  persist(); closeModals(); render();
}
function confirmDelete() {
  const e=entries.find(x=>x.id===deleteId);
  entries=entries.filter(x=>x.id!==deleteId);
  persist(); closeModals(); render();
  showToast(`"${e?.subject}" removed`,'success');
}

// ── toast ─────────────────────────────────────────────────────────────────────
function showToast(msg,type='success') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${type} show`;
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2800);
}

// backdrop & keyboard
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeModals();}));
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModals(); if((e.ctrlKey||e.metaKey)&&e.key==='Enter') saveEntry(); });

render();
</script>
</body>
</html>
